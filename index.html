<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaktüs // Norm Ender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>
    <div class="background-image"></div>

    <main class="player-container">
        <header class="song-info">
            <h1>Kaktüs</h1>
            <p>Norm Ender</p>
        </header>

        <section class="lyrics-window">
            <div class="lyrics-content">
                <p>Bir yanım kaktüs, bir yanım bahar...</p>
                <p>Yine de dikeni batar, ruhumu sarar.</p>
                </div>
        </section>

        <footer class="controls">
            <audio id="music" src="kaktus.mp3"></audio>
            <button onclick="togglePlay()" id="playBtn">BAŞLAT</button>
        </footer>
    </main>

    <script src="script.js"></script>
  <script>
    const music = document.getElementById('music');
const playBtn = document.getElementById('playBtn');

function togglePlay() {
    if (music.paused) {
        music.play();
        playBtn.innerText = "DURAKLAT";
        playBtn.style.opacity = "0.5";
    } else {
        music.pause();
        playBtn.innerText = "DEVAM ET";
        playBtn.style.opacity = "1";
    }
}

// Zamanla sözlerin kayması için basit bir mekanizma eklenebilir
// Şarkıdaki saniyelere göre .lyrics-content transform: translateY() yapılabilir.
      <script>
</body>
</html>
